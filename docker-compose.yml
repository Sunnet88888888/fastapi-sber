version: '3.9'

services:
  web:
    build: .
    container_name: ai-agent-web
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/ai_agent}
      - SECRET_KEY=${SECRET_KEY:-supersecret}
      - SUPER_USER_SECRET_KEY=${SUPER_USER_SECRET_KEY:-supersecretadmin}
    depends_on:
      - db
    volumes:
      - ./ai-agent:/app
      - ./ai-agent/storage:/app/storage

  db:
    image: postgres:16
    container_name: ai-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
